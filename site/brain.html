<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    if (window.location.pathname.endsWith('/brain')) {
      window.location.replace(window.location.pathname + '/');
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIZIER Brain — Interactive Knowledge Graph</title>
  <meta name="description" content="Explore the VIZIER living knowledge brain — 500-node Day-251 vision or live real entries. Interactive concentric-ring galaxy with search and domain filtering.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- D3 and Marked -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg: #07090c;
      --panel-bg: rgba(10, 16, 22, 0.82);
      --panel-border: rgba(42, 127, 127, 0.22);
      --teal: #2a7f7f;
      --teal-glow: rgba(42, 127, 127, 0.4);
      --bright: #3ee2e2;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --dark: #64748b;
      /* Node colors */
      --c-center: #3ee2e2;
      --c-domain: #2a7f7f;
      --c-feynman: #f6ad55;
      --c-knowledge: #68d391;
      --c-skill: #fc8181;
      --c-routine: #d4a017;
      --c-application: #a0aec0;
      /* Preview badge */
      --preview-bg: rgba(246, 173, 85, 0.15);
      --preview-border: rgba(246, 173, 85, 0.5);
      --preview-text: #f6ad55;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', sans-serif;
      overflow: hidden;
      width: 100vw; height: 100vh;
    }

    /* Hex grid background */
    #canvas-container {
      width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
      z-index: 1;
      background-image:
        radial-gradient(circle at 1px 1px, rgba(42,127,127,0.09) 1px, transparent 0),
        linear-gradient(rgba(42,127,127,0.025) 1px, transparent 0),
        linear-gradient(90deg, rgba(42,127,127,0.025) 1px, transparent 0);
      background-size: 20px 20px, 40px 40px, 40px 40px;
    }

    svg { width: 100%; height: 100%; display: block; }

    /* Glass panels */
    .glass {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.55);
      position: absolute;
      z-index: 10;
      transition: all .28s cubic-bezier(.16,1,.3,1);
    }

    /* ── PREVIEW BADGE ──────────────────────────────── */
    #preview-badge {
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 18px;
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      background: var(--preview-bg);
      border: 1px solid var(--preview-border);
      color: var(--preview-text);
      border-radius: 20px;
      display: none;
      pointer-events: none;
      white-space: nowrap;
    }
    #preview-badge.visible { display: block; }

    /* ── CONTROL PANEL ─────────────────────────────── */
    #ctrl {
      top: 16px; left: 16px;
      width: 306px;
      padding: 18px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--teal) transparent;
    }

    .brand-row {
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 10px;
    }
    .brand-row .brand {
      font-size: 1rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--bright);
    }
    .brand-row .day-chip {
      font-size: .65rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .04em;
      background: rgba(42,127,127,.2); border: 1px solid var(--teal);
      padding: 2px 8px; border-radius: 4px;
    }

    .nav-row {
      display: flex; gap: 14px; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em;
    }
    .nav-row a {
      color: var(--bright); text-decoration: none; display: flex; align-items: center; gap: 5px;
      transition: opacity .2s;
    }
    .nav-row a:hover { opacity: .75; }
    .nav-row a svg { width: 12px; height: 12px; }

    .ctrl-label {
      font-size: .68rem; text-transform: uppercase; letter-spacing: .05em;
      color: var(--muted); display: flex; justify-content: space-between; align-items: center;
    }
    .ctrl-group { display: flex; flex-direction: column; gap: 6px; }

    /* Toggle buttons */
    .tog-group {
      display: flex;
      background: rgba(0,0,0,.4);
      border-radius: 6px; padding: 2px;
      border: 1px solid rgba(42,127,127,.15);
    }
    .tog {
      flex: 1; background: transparent; border: none;
      color: var(--muted); padding: 6px 8px; font-size: .72rem;
      cursor: pointer; border-radius: 4px; transition: all .18s;
      font-family: inherit; font-weight: 500;
    }
    .tog.on { background: var(--teal); color: #fff; box-shadow: 0 0 10px var(--teal-glow); }

    /* Data Mode toggle — more prominent */
    .data-mode-group .tog.on { background: #1e5c5c; border: 1px solid var(--bright); }
    .data-mode-group .tog.on[data-mode="preview"] {
      background: rgba(246,173,85,.25); border-color: rgba(246,173,85,.6); color: #f6ad55;
    }

    /* Sliders */
    .slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,.1); outline: none; margin: 4px 0;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px;
      border-radius: 50%; background: var(--bright); cursor: pointer;
      box-shadow: 0 0 8px var(--teal-glow); transition: transform .1s;
    }
    .slider::-webkit-slider-thumb:hover { transform: scale(1.25); }

    /* Stats */
    .stats-box {
      background: rgba(0,0,0,.2); border-radius: 6px; padding: 10px;
      display: flex; flex-direction: column; gap: 5px; font-size: .72rem;
    }
    .stat-row { display: flex; justify-content: space-between; color: var(--muted); }
    .stat-row span:last-child { color: var(--bright); font-weight: 600; }

    /* Preview info strip */
    #preview-strip {
      font-size: .68rem; color: var(--preview-text);
      background: var(--preview-bg);
      border: 1px solid var(--preview-border);
      border-radius: 6px; padding: 8px 10px; display: none; line-height: 1.5;
    }
    #preview-strip.visible { display: block; }

    /* ── SEARCH ──────────────────────────────────────── */
    #search-panel {
      top: 16px; right: 16px;
      width: 300px; padding: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    #search-input {
      flex: 1;
      background: rgba(0,0,0,.4); border: 1px solid var(--panel-border);
      border-radius: 6px; padding: 7px 12px;
      color: #fff; font-family: inherit; font-size: .82rem; outline: none;
      transition: border-color .2s;
    }
    #search-input:focus { border-color: var(--bright); box-shadow: 0 0 8px rgba(62,226,226,.2); }
    #search-results {
      position: absolute; top: 50px; right: 10px; left: 10px;
      max-height: 260px; overflow-y: auto;
      background: rgba(7,9,12,.97);
      border: 1px solid var(--panel-border); border-radius: 6px;
      z-index: 20; display: none;
    }
    .si {
      padding: 8px 12px; font-size: .78rem; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,.04);
      display: flex; justify-content: space-between; align-items: center;
    }
    .si:hover { background: rgba(42,127,127,.2); color: var(--bright); }
    .si-type {
      font-size: .62rem; text-transform: uppercase; color: var(--dark);
      background: rgba(255,255,255,.05); padding: 1px 5px; border-radius: 3px;
    }

    /* ── INSPECTOR ──────────────────────────────────── */
    #insp {
      top: 16px; right: 16px;
      width: 400px; height: calc(100vh - 32px);
      padding: 22px;
      display: flex; flex-direction: column; gap: 14px;
      transform: translateX(440px);
      overflow: hidden;
    }
    #insp.open { transform: translateX(0); }

    .insp-title { font-size: 1.1rem; font-weight: 600; color: var(--bright); }
    .insp-meta { font-size: .68rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); display: flex; flex-wrap: wrap; gap: 6px; }
    .mtag { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); padding: 2px 7px; border-radius: 4px; }
    .insp-body { flex: 1; overflow-y: auto; font-size: .83rem; line-height: 1.65; display: flex; flex-direction: column; gap: 14px; padding-right: 4px; }
    .details-grid {
      display: grid; grid-template-columns: auto 1fr; gap: 7px 14px;
      background: rgba(0,0,0,.25); padding: 10px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,.03); font-size: .72rem;
    }
    .gl { color: var(--muted); text-transform: uppercase; font-weight: 500; }
    .gv { color: var(--text); font-family: 'JetBrains Mono', monospace; word-break: break-all; }
    .insp-preview { border-top: 1px solid rgba(42,127,127,.1); padding-top: 14px; }
    .md h1,.md h2,.md h3 { color: var(--bright); margin-top: 14px; margin-bottom: 6px; font-weight: 600; }
    .md h1 { font-size: 1.05rem; } .md h2 { font-size: .92rem; } .md h3 { font-size: .82rem; }
    .md p { margin-bottom: 9px; }
    .md ul,.md ol { margin-left: 18px; margin-bottom: 9px; }
    .md code { background: rgba(0,0,0,.4); padding: 1px 5px; border-radius: 3px; font-family: 'JetBrains Mono',monospace; font-size: .72rem; color: #fc8181; }
    .action-row { display: flex; gap: 8px; margin-top: auto; border-top: 1px solid var(--panel-border); padding-top: 14px; }
    .btn-act {
      flex: 1; background: rgba(42,127,127,.12); border: 1px solid var(--panel-border);
      color: var(--text); padding: 7px 14px; font-size: .72rem; font-weight: 500;
      cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all .18s; text-transform: uppercase; letter-spacing: .05em; font-family: inherit;
    }
    .btn-act:hover { background: var(--teal); border-color: var(--bright); color: #fff; box-shadow: 0 0 10px var(--teal-glow); }
    .btn-close {
      position: absolute; top: 14px; right: 14px;
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; transition: all .18s;
    }
    .btn-close:hover { background: rgba(255,255,255,.05); color: #fff; }

    /* SVG elements */
    .link { stroke: var(--teal); stroke-opacity: .16; stroke-width: 1px; transition: stroke-opacity .2s,stroke-width .2s; }
    .link.wiki-link { stroke: var(--c-feynman); stroke-dasharray: 4,4; stroke-opacity: .32; }
    .link.highlighted { stroke: var(--bright); stroke-opacity: .85; stroke-width: 2px; }
    .link.dimmed { stroke-opacity: .04; }

    .node { cursor: pointer; transition: r .2s cubic-bezier(.16,1,.3,1), stroke-width .18s; }
    .node:hover { filter: drop-shadow(0 0 8px var(--teal-glow)); }
    .node.highlighted { stroke: #fff !important; stroke-width: 2.5px !important; }
    .node.dimmed { opacity: .18; }
    .node.pulsing { animation: pulse 1.5s infinite alternate; }

    @keyframes pulse {
      0%   { stroke-width: 1px; filter: drop-shadow(0 0 2px var(--teal-glow)); }
      100% { stroke-width: 4px; stroke: var(--bright); filter: drop-shadow(0 0 14px rgba(62,226,226,.85)); }
    }

    .node-label { font-size: 8px; fill: var(--muted); pointer-events: none; text-anchor: middle; font-weight: 400; }
    .node-label.active { fill: #fff; font-weight: 600; font-size: 9px; }

    .ring-guide { fill: none; stroke: rgba(42,127,127,.055); stroke-width: 1px; stroke-dasharray: 5,7; pointer-events: none; }
    .ring-label { fill: var(--dark); font-size: 8px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; pointer-events: none; }

    /* Tooltip */
    #tooltip {
      position: fixed; pointer-events: none;
      background: rgba(7,9,12,.95); border: 1px solid var(--teal);
      border-radius: 8px; padding: 10px 14px; font-size: .76rem;
      color: var(--text); z-index: 100; display: none; max-width: 280px;
      box-shadow: 0 4px 16px rgba(0,0,0,.6);
    }
    #tooltip .tt-title { font-weight: 600; color: var(--bright); margin-bottom: 5px; line-height: 1.4; }
    #tooltip .tt-row { color: var(--muted); font-size: .68rem; margin-top: 2px; }
    #tooltip .tt-row span { color: var(--text); }

    /* Focus ring accessibility */
    button:focus-visible, input:focus-visible, a:focus-visible {
      outline: 2px solid var(--bright); outline-offset: 2px;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .node.pulsing { animation: none; }
      * { transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

<!-- Control panel -->

  <div class="brand-row">
    <div class="brand">VIZIER</div>

  <div class="nav-row">
    <a href="index.html">

  <!-- DATA MODE -->

  <!-- LAYOUT -->
  <div class="ctrl-group">

  <!-- RING SPIN (rings mode only) -->
  <div class="ctrl-group" id="ctrl-spin">

    </div>

  <!-- LABELS -->
  <div class="ctrl-group">

      <button class="tog on" id="btn-lab-all">All</button>

  <!-- NODE SIZE -->
  <div class="ctrl-group">
    <div class="ctrl-label">

    <input type="range" class="slider" id="sl-size" min="4" max="16" value="8">

  <!-- LINK DISTANCE (force only) -->

  <!-- STATS -->

    <div class="ctrl-label">Brain Stats</div>

<!-- Search -->

<!-- Inspector -->

<!-- Tooltip -->

</div>

<!-- Canvas + SVG -->

  <canvas id="graph-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;display:none;"></canvas>
  <svg id="graph-svg" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:3;"></svg>

<script>
'use strict';

// ── Config ────────────────────────────────────────────────────────────────────
const START_DATE = new Date('2026-07-09');
const DAY_NUM = Math.max(1, Math.floor((new Date() - START_DATE) / 86400000) + 1);
document.getElementById('day-chip').textContent = `Day ${DAY_NUM} of 251`;

const LIVE_SRC    = 'brain-index.public.json';
const PREVIEW_SRC = 'brain-index.preview.json';

const ringRadii = { center: 0, skills: 145, knowledge: 320, routines: 490, applications: 640 };

const domainColors = {
  gut:          '#68d391',
  'mind-gut':   '#76e4f7',
  nutrition:    '#f6ad55',
  'health-core':'#fc8181',
  mind:         '#b794f4',
  body:         '#4fd1c5',
  communication:'#fbd38d',
  meta:         '#a0aec0',
  'family-os':  '#f687b3',
  handyman:     '#d69e2e',
};

function nodeColor(d) {
  if (d.type === 'center')      return '#3ee2e2';
  if (d.type === 'domain')      return d.color || domainColors[d.domain] || '#2a7f7f';
  if (d.type === 'feynman')     return '#f6ad55';
  if (d.type === 'knowledge')   return domainColors[d.domain] || '#68d391';
  if (d.type === 'skill')       return '#fc8181';
  if (d.type === 'routine')     return d.status === 'planned' ? '#8a6914' : '#d4a017';
  if (d.type === 'application') return '#a0aec0';
  return '#94a3b8';
}

// ── State ─────────────────────────────────────────────────────────────────────
let graphData = null;
let selectedNode = null;
let hoveredDomain = null;
let layoutMode = 'rings';
let labelsMode = 'all';
let dataMode = 'preview';
let baseNodeSize = 8;
let linkDistance = 80;
let spinSpeed = 0.2;          // degrees per frame
let ringSpin = 0;             // current rotation angle (degrees)
let spinAnimId = null;
let hoveredNode = null;
let quadtree = null;

const W = window.innerWidth, H = window.innerHeight;

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvasEl = document.getElementById('graph-canvas');
const ctx = canvasEl.getContext('2d');
let currentTransform = d3.zoomIdentity;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvasEl.width  = window.innerWidth  * dpr;
  canvasEl.height = window.innerHeight * dpr;
  ctx.scale(dpr, dpr);
  if (graphData && graphData.nodes.length > 1500) drawCanvas();
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── SVG ───────────────────────────────────────────────────────────────────────
const svg = d3.select('#graph-svg');
const G   = svg.append('g').attr('class', 'root');

const zoom = d3.zoom()
  .scaleExtent([0.06, 10])
  .on('zoom', ev => {
    currentTransform = ev.transform;
    G.attr('transform', ev.transform);
    if (graphData && graphData.nodes.length > 1500) drawCanvas();
  });
svg.call(zoom);
zoom.translateTo(svg, W / 2, H / 2);

const simulation = d3.forceSimulation()
  .force('link',      d3.forceLink().id(d => d.id).distance(linkDistance))
  .force('charge',    d3.forceManyBody().strength(-280))
  .force('center',    d3.forceCenter(W / 2, H / 2))
  .force('collision', d3.forceCollide().radius(d => getR(d) + 4));

function getR(d) {
  if (d.type === 'center')      return baseNodeSize * 2.4;
  if (d.type === 'domain')      return baseNodeSize * 1.7;
  if (d.type === 'skill')       return baseNodeSize * 1.2;
  if (d.type === 'routine')     return baseNodeSize * 1.15;
  if (d.type === 'application') return baseNodeSize * 1.3;
  return baseNodeSize;
}

// ── Load data ─────────────────────────────────────────────────────────────────
function loadData(src) {
  d3.json(src).then(data => {
    graphData = data;
    document.getElementById('st-nodes').textContent = data.metadata ? data.metadata.node_count : data.nodes.length;
    document.getElementById('st-edges').textContent = data.metadata ? data.metadata.edge_count : data.edges.length;
    renderGraph();
    setupSearch();
  }).catch(err => {
    console.error('Failed to load', src, err);
  });
}

// Check URL param for mode
const urlParams = new URLSearchParams(window.location.search);
const initMode = urlParams.get('mode') === 'live' ? 'live' : 'preview';
setDataMode(initMode, false);

function setDataMode(mode, reload = true) {
  dataMode = mode;
  const badge   = document.getElementById('preview-badge');
  const strip   = document.getElementById('preview-strip');
  const btnLive = document.getElementById('btn-live');
  const btnPrev = document.getElementById('btn-preview');

  if (mode === 'preview') {
    badge.classList.add('visible');
    strip.classList.add('visible');
    btnPrev.classList.add('on');
    btnLive.classList.remove('on');
    if (reload) loadData(PREVIEW_SRC);
  } else {
    badge.classList.remove('visible');
    strip.classList.remove('visible');
    btnLive.classList.add('on');
    btnPrev.classList.remove('on');
    if (reload) loadData(LIVE_SRC);
  }
}

document.getElementById('btn-live').addEventListener('click', () => setDataMode('live'));
document.getElementById('btn-preview').addEventListener('click', () => setDataMode('preview'));

// ── Render ─────────────────────────────────────────────────────────────────────
let linkSel = d3.select(null);
let nodeSel = d3.select(null);
let labelSel = d3.select(null);

function renderGraph() {
  G.selectAll('*').remove();
  if (spinAnimId) { cancelAnimationFrame(spinAnimId); spinAnimId = null; }

  const nodes = graphData.nodes;
  const edges = graphData.edges;

  const useCanvas = nodes.length > 1500;
  d3.select('#graph-canvas').style('display', useCanvas ? 'block' : 'none');

  // Build adjacency for connection count
  const connCount = {};
  for (const e of edges) {
    connCount[e.source.id ?? e.source] = (connCount[e.source.id ?? e.source] || 0) + 1;
    connCount[e.target.id ?? e.target] = (connCount[e.target.id ?? e.target] || 0) + 1;
  }
  nodes.forEach(n => { n._conn = connCount[n.id] || 0; });

  if (layoutMode === 'rings') {
    assignRingPositions(nodes);
  }

  // ── Ring guides ────────────────────────────────────────────────────────────
  if (layoutMode === 'rings') {
    const rg = G.append('g').attr('class', 'ring-guides').attr('transform', `translate(${W/2},${H/2})`);
    [
      [ringRadii.skills,       'SKILLS'],
      [ringRadii.knowledge,    'MEMORY'],
      [ringRadii.routines,     'ROUTINES'],
      [ringRadii.applications, 'APPLICATIONS'],
    ].forEach(([r, lbl]) => {
      rg.append('circle').attr('class', 'ring-guide').attr('r', r);
      rg.append('text').attr('class', 'ring-label')
        .attr('x', 0).attr('y', -(r + 7))
        .attr('text-anchor', 'middle').text(lbl);
    });
  }

  // ── Links ─────────────────────────────────────────────────────────────────
  linkSel = G.append('g').attr('class', 'links')
    .selectAll('line')
    .data(edges)
    .join('line')
    .attr('class', d => `link${d.type === 'wiki-link' ? ' wiki-link' : ''}`)
    .attr('stroke', d => d.type === 'wiki-link' ? '#f6ad55' : '#2a7f7f');

  // ── Nodes ─────────────────────────────────────────────────────────────────
  nodeSel = G.append('g').attr('class', 'nodes')
    .selectAll('circle')
    .data(nodes, d => d.id)
    .join('circle')
    .attr('class', 'node')
    .attr('r', d => getR(d))
    .attr('fill', d => nodeColor(d))
    .attr('stroke', 'rgba(255,255,255,.15)')
    .attr('stroke-width', 1)
    .on('mouseover', onNodeHover)
    .on('mouseout',  onNodeOut)
    .on('click',     onNodeClick);

  // ── Labels ──────────────────────────────────────────────────────────────
  labelSel = G.append('g').attr('class', 'labels')
    .selectAll('text')
    .data(nodes.filter(n => n.type !== 'feynman' && n.type !== 'knowledge' || n.type === 'domain' || n.type === 'center'), d => d.id)
    .join('text')
    .attr('class', 'node-label')
    .attr('dy', d => getR(d) + 10)
    .text(d => truncLabel(d.label, d.type));

  if (layoutMode === 'rings') {
    positionRings();
    startRingSpin();
  } else {
    runForce(nodes, edges);
  }
}

function truncLabel(label, type) {
  if (type === 'center' || type === 'domain') return label;
  return label.length > 22 ? label.slice(0, 20) + '…' : label;
}

// ── RINGS positioning ─────────────────────────────────────────────────────────
function assignRingPositions(nodes) {
  const cx = W / 2, cy = H / 2;

  // Group by ring
  const byRing = {};
  for (const n of nodes) {
    const r = n.ring || 'knowledge';
    if (!byRing[r]) byRing[r] = [];
    byRing[r].push(n);
  }

  // Center
  const center = byRing.center || [];
  center.forEach(n => { n.x = cx; n.y = cy; n.fx = cx; n.fy = cy; });

  // Inner rings placed on circle
  function placeOnRing(nodes, radius, startAngle = 0) {
    nodes.forEach((n, i) => {
      const angle = startAngle + (2 * Math.PI * i) / nodes.length;
      n.x  = cx + radius * Math.cos(angle);
      n.y  = cy + radius * Math.sin(angle);
      n.fx = n.x;
      n.fy = n.y;
      n._angle  = angle;
      n._radius = radius;
    });
  }

  // Skills
  placeOnRing(byRing.skills || [], ringRadii.skills);

  // Knowledge — cluster by domain within the ring
  const knowledgeNodes = byRing.knowledge || [];
  const domainNodes    = knowledgeNodes.filter(n => n.type === 'domain');
  const noteNodes      = knowledgeNodes.filter(n => n.type !== 'domain');

  // Place domain nodes evenly on ring
  placeOnRing(domainNodes, ringRadii.knowledge);

  // Place note nodes in clusters near their domain
  const domainAngleMap = {};
  for (const d of domainNodes) {
    domainAngleMap[d.domain || d.id.replace('domain-', '')] = d._angle;
  }

  const notesByDomain = {};
  for (const n of noteNodes) {
    const dom = n.domain || 'meta';
    if (!notesByDomain[dom]) notesByDomain[dom] = [];
    notesByDomain[dom].push(n);
  }

  for (const [dom, notes] of Object.entries(notesByDomain)) {
    const baseAngle = domainAngleMap[dom] ?? 0;
    const spread    = (2 * Math.PI) / Math.max(Object.keys(notesByDomain).length, 1);
    const halfSpread = spread * 0.45;

    notes.forEach((n, i) => {
      // Multi-radius — mix inner and outer tiers for texture
      const radiusVar = ringRadii.knowledge - 70 + (i % 5) * 35;
      const angle = baseAngle - halfSpread + (2 * halfSpread * i) / Math.max(notes.length - 1, 1);
      n.x  = cx + radiusVar * Math.cos(angle);
      n.y  = cy + radiusVar * Math.sin(angle);
      n.fx = n.x;
      n.fy = n.y;
      n._angle  = angle;
      n._radius = radiusVar;
    });
  }

  // Routines
  placeOnRing(byRing.routines || [], ringRadii.routines);

  // Applications
  placeOnRing(byRing.applications || [], ringRadii.applications);
}

function positionRings() {
  nodeSel.attr('cx', d => d.x).attr('cy', d => d.y);
  labelSel.attr('x', d => d.x).attr('y', d => d.y);
  linkSel
    .attr('x1', d => (d.source.x ?? 0))
    .attr('y1', d => (d.source.y ?? 0))
    .attr('x2', d => (d.target.x ?? 0))
    .attr('y2', d => (d.target.y ?? 0));
}

function startRingSpin() {
  if (spinSpeed === 0) return;
  const cx = W / 2, cy = H / 2;

  function tick() {
    ringSpin += spinSpeed * 0.001; // slow radians per frame

    // Rotate only skills and applications rings (inner + outer spin together)
    nodeSel.each(function(d) {
      if (d.fx === undefined || d.ring === 'center') return;
      if (d.ring === 'skills' || d.ring === 'applications') {
        const baseAngle = d._angle + ringSpin;
        d.x = cx + d._radius * Math.cos(baseAngle);
        d.y = cy + d._radius * Math.sin(baseAngle);
      }
    });
    positionRings();
    spinAnimId = requestAnimationFrame(tick);
  }
  spinAnimId = requestAnimationFrame(tick);
}

// ── FORCE layout ──────────────────────────────────────────────────────────────
function runForce(nodes, edges) {
  // Unfix positions
  nodes.forEach(n => { n.fx = null; n.fy = null; });
  simulation.nodes(nodes);
  simulation.force('link').links(edges).distance(linkDistance);
  simulation.alpha(1).restart();

  simulation.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeSel.attr('cx', d => d.x).attr('cy', d => d.y);
    labelSel.attr('x', d => d.x).attr('y', d => d.y);
  });
}

// ── Canvas (>1500 nodes) ──────────────────────────────────────────────────────
function drawCanvas() {
  const { k, x, y } = currentTransform;
  ctx.clearRect(0, 0, canvasEl.width / (window.devicePixelRatio || 1), canvasEl.height / (window.devicePixelRatio || 1));
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(k, k);

  if (graphData) {
    for (const e of graphData.edges) {
      const s = e.source, t = e.target;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(t.x, t.y);
      ctx.strokeStyle = 'rgba(42,127,127,0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    for (const n of graphData.nodes) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, getR(n), 0, Math.PI * 2);
      ctx.fillStyle = nodeColor(n);
      ctx.fill();
    }
  }
  ctx.restore();
}

// ── Interactions ──────────────────────────────────────────────────────────────
function onNodeHover(event, d) {
  hoveredNode = d;
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-title').textContent = d.label;
  document.getElementById('tt-domain').innerHTML = d.domain ? `Domain: <span>${d.domain}</span>` : '';
  document.getElementById('tt-type').innerHTML   = `Type: <span>${d.type}</span>`;
  document.getElementById('tt-conn').innerHTML   = `Connections: <span>${d._conn || 0}</span>`;
  tt.style.display = 'block';

  if (d.type === 'domain' || (d.domain && d.type !== 'center')) {
    const domId = d.type === 'domain' ? (d.domain || d.id.replace('domain-', '')) : d.domain;
    highlightDomain(domId);
  }
}

function onNodeOut() {
  hoveredNode = null;
  document.getElementById('tooltip').style.display = 'none';
  clearHighlight();
}

document.addEventListener('mousemove', ev => {
  const tt = document.getElementById('tooltip');
  if (tt.style.display === 'block') {
    tt.style.left = (ev.clientX + 14) + 'px';
    tt.style.top  = (ev.clientY + 14) + 'px';
  }
});

function highlightDomain(domId) {
  hoveredDomain = domId;
  nodeSel.classed('dimmed',      d => d.domain !== domId && d.type !== 'center' && !(d.type === 'domain'));
  nodeSel.classed('highlighted', d => d.domain === domId || d.id === `domain-${domId}`);
  linkSel.classed('dimmed',      () => true);
  linkSel.classed('highlighted', d => {
    const s = d.source.domain || d.source.id;
    const t = d.target.domain || d.target.id;
    return s === domId || t === domId;
  });
}

function clearHighlight() {
  hoveredDomain = null;
  nodeSel.classed('dimmed highlighted', false);
  linkSel.classed('dimmed highlighted', false);
}

function onNodeClick(event, d) {
  event.stopPropagation();
  selectedNode = d;
  openInspector(d);

  // Fly-to
  const [tx, ty] = [d.x || W/2, d.y || H/2];
  const k = currentTransform.k;
  svg.transition().duration(600)
    .call(zoom.transform, d3.zoomIdentity.translate(W/2 - tx * k, H/2 - ty * k).scale(k));

  // Pulse
  nodeSel.classed('pulsing', false);
  nodeSel.filter(n => n.id === d.id).classed('pulsing', true);
}

svg.on('click', () => {
  nodeSel.classed('pulsing', false);
  document.getElementById('insp').classList.remove('open');
  selectedNode = null;
  clearHighlight();
});

function openInspector(d) {
  const insp = document.getElementById('insp');
  document.getElementById('node-title').textContent = d.label;
  const meta = document.getElementById('node-meta');
  meta.innerHTML = [d.domain, d.type, d.tier ? `Tier ${d.tier}` : '', d.date || '']
    .filter(Boolean).map(t => `<span class="mtag">${t}</span>`).join('');
  const grid = document.getElementById('node-details');
  grid.innerHTML = [
    ['ID',    d.id],
    ['Ring',  d.ring || '—'],
    ['Connections', d._conn || 0],
    d.tags   ? ['Tags',  d.tags.join(', ')] : null,
    d.status ? ['Status', d.status] : null,
    d.trustLevel ? ['Trust', d.trustLevel] : null,
    d.date   ? ['Date',  d.date] : null,
  ].filter(Boolean).map(([k, v]) =>
    `<span class="gl">${k}</span><span class="gv">${v}</span>`
  ).join('');

  document.getElementById('node-preview').innerHTML = '';
  if (d.slug) {
    fetch(`notes/${d.slug}.md`)
      .then(r => r.ok ? r.text() : null)
      .then(md => { if (md) document.getElementById('node-preview').innerHTML = marked.parse(md); })
      .catch(() => {});
  }
  insp.classList.add('open');
  document.getElementById('search-panel').style.display = 'none';
}

document.getElementById('btn-close').addEventListener('click', () => {
  document.getElementById('insp').classList.remove('open');
  document.getElementById('search-panel').style.display = 'flex';
  nodeSel.classed('pulsing', false);
  selectedNode = null;
});

document.getElementById('btn-copy').addEventListener('click', () => {
  if (selectedNode) navigator.clipboard?.writeText(selectedNode.id || selectedNode.label);
});

document.getElementById('btn-view').addEventListener('click', () => {
  if (selectedNode?.slug) window.open(`notes/${selectedNode.slug}.html`, '_blank');
});

// ── Search ────────────────────────────────────────────────────────────────────
function setupSearch() {
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');

  input.addEventListener('input', () => {
    const q = input.value.toLowerCase().trim();
    if (!q || !graphData) { results.style.display = 'none'; return; }

    const matches = graphData.nodes.filter(n =>
      n.label?.toLowerCase().includes(q) ||
      n.domain?.toLowerCase().includes(q) ||
      n.tags?.some(t => t.toLowerCase().includes(q))
    ).slice(0, 18);

    if (!matches.length) { results.style.display = 'none'; return; }

    results.innerHTML = matches.map(n => `
      <div class="si" data-id="${n.id}" role="option">
        <span>${n.label}</span>
        <span class="si-type">${n.type}</span>
      </div>
    `).join('');
    results.style.display = 'block';

    results.querySelectorAll('.si').forEach(el => {
      el.addEventListener('click', () => {
        const node = graphData.nodes.find(n => n.id === el.dataset.id);
        if (node) {
          onNodeClick({ stopPropagation: () => {} }, node);
          results.style.display = 'none';
          input.value = '';
        }
      });
    });
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#search-panel')) results.style.display = 'none';
  });
}

// ── Controls ──────────────────────────────────────────────────────────────────
// Layout
document.getElementById('btn-rings').addEventListener('click', () => {
  layoutMode = 'rings';
  document.getElementById('btn-rings').classList.add('on');
  document.getElementById('btn-force').classList.remove('on');
  document.getElementById('ctrl-spring').style.display = 'none';
  document.getElementById('ctrl-spin').style.display = 'flex';
  simulation.stop();
  if (graphData) renderGraph();
});
document.getElementById('btn-force').addEventListener('click', () => {
  layoutMode = 'force';
  document.getElementById('btn-force').classList.add('on');
  document.getElementById('btn-rings').classList.remove('on');
  document.getElementById('ctrl-spring').style.display = 'flex';
  document.getElementById('ctrl-spin').style.display = 'none';
  if (spinAnimId) { cancelAnimationFrame(spinAnimId); spinAnimId = null; }
  if (graphData) renderGraph();
});

// Labels
['all', 'smart', 'none'].forEach(mode => {
  document.getElementById(`btn-lab-${mode}`).addEventListener('click', () => {
    labelsMode = mode;
    ['all', 'smart', 'none'].forEach(m => document.getElementById(`btn-lab-${m}`).classList.toggle('on', m === mode));
    updateLabels();
  });
});

function updateLabels() {
  if (!labelSel || labelSel.empty()) return;
  labelSel.style('display', d => {
    if (labelsMode === 'none') return 'none';
    if (labelsMode === 'smart') return (d.type === 'center' || d.type === 'domain' || d.type === 'skill' || d.type === 'routine') ? '' : 'none';
    return '';
  });
}

// Node size
const slSize = document.getElementById('sl-size');
slSize.addEventListener('input', () => {
  baseNodeSize = +slSize.value;
  document.getElementById('lbl-size').textContent = baseNodeSize + 'px';
  if (nodeSel) nodeSel.attr('r', d => getR(d));
});

// Ring spin
const slSpin = document.getElementById('sl-spin');
slSpin.addEventListener('input', () => {
  spinSpeed = +slSpin.value / 10;
  document.getElementById('lbl-spin').textContent = spinSpeed.toFixed(1);
  if (spinAnimId) { cancelAnimationFrame(spinAnimId); spinAnimId = null; }
  if (layoutMode === 'rings') startRingSpin();
});

// Link distance
const slSpring = document.getElementById('sl-spring');
slSpring.addEventListener('input', () => {
  linkDistance = +slSpring.value;
  document.getElementById('lbl-spring').textContent = linkDistance + 'px';
  if (simulation) simulation.force('link').distance(linkDistance).alphaTarget(0.3).restart();
  setTimeout(() => simulation.alphaTarget(0), 2000);
});
</script>
</body>
